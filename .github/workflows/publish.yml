name: Publish

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      publish_spigot:
        description: 'Publish to SpigotMC using SPIGOT_* secrets/variables'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: publish-${{ github.ref_type == 'tag' && github.ref_name || 'main-snapshot' }}
  cancel-in-progress: ${{ github.ref_type != 'tag' }}

jobs:
  publish:
    if: vars.ENABLE_PUBLISHING == 'true'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4


      - name: Derive release context
        id: context
        run: python3 .github/scripts/derive-release-context.py >> "$GITHUB_OUTPUT"

      - name: Validate publishing configuration
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          HANGAR_PROJECT_ID: ${{ vars.HANGAR_PROJECT_ID }}
          HANGAR_API_TOKEN: ${{ secrets.HANGAR_API_TOKEN }}
        run: |
          test -n "$CLOUDFLARE_ACCOUNT_ID" || { echo "Missing CLOUDFLARE_ACCOUNT_ID repository variable"; exit 1; }
          test -n "$CLOUDFLARE_API_TOKEN" || { echo "Missing CLOUDFLARE_API_TOKEN secret"; exit 1; }
          test -n "$R2_ACCESS_KEY_ID" || { echo "Missing R2_ACCESS_KEY_ID secret"; exit 1; }
          test -n "$R2_SECRET_ACCESS_KEY" || { echo "Missing R2_SECRET_ACCESS_KEY secret"; exit 1; }
          test -n "$HANGAR_PROJECT_ID" || { echo "Missing HANGAR_PROJECT_ID repository variable"; exit 1; }
          test -n "$HANGAR_API_TOKEN" || { echo "Missing HANGAR_API_TOKEN secret"; exit 1; }

      - name: Build and verify release assets
        run: >-
          ./gradlew check buildDocsSite :apps:bukkit-plugin:shadowJar prepareReleaseAssets syncPublicMavenRepository
          -PtitleManagerJvmVersion=${{ steps.context.outputs.gradle_version }}
          -PtitleManagerCoreVersion=${{ steps.context.outputs.gradle_version }}

      - name: Add Maven repository index
        run: python3 .github/scripts/write-maven-index.py

      - name: Collect release assets
        run: |
          mkdir -p build/github-release-assets
          cp build/release-assets/TitleManager-${{ steps.context.outputs.gradle_version }}.jar build/github-release-assets/
          cp build/distributions/*.zip build/github-release-assets/
          python3 .github/scripts/write-checksums.py build/github-release-assets/*

      - name: Prepare release notes
        id: notes
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.context.outputs.release_tag }}
          SNAPSHOT: ${{ steps.context.outputs.snapshot }}
        run: |
          if [ "$SNAPSHOT" = "true" ]; then
            git log -1 --pretty=%B > build/release-notes.md
          elif gh release view "$RELEASE_TAG" --json body --jq .body > build/release-notes.md 2>/dev/null; then
            true
          else
            gh api repos/${{ github.repository }}/releases/generate-notes -f tag_name="$RELEASE_TAG" --jq .body > build/release-notes.md
          fi
          {
            echo 'body<<EOF'
            cat build/release-notes.md
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Create snapshot tag if needed
        if: steps.context.outputs.snapshot == 'true'
        run: |
          if git rev-parse "refs/tags/${{ steps.context.outputs.release_tag }}" >/dev/null 2>&1; then
            echo "Snapshot tag already exists locally"
          elif git ls-remote --exit-code --tags origin "refs/tags/${{ steps.context.outputs.release_tag }}" >/dev/null 2>&1; then
            git fetch origin "refs/tags/${{ steps.context.outputs.release_tag }}:refs/tags/${{ steps.context.outputs.release_tag }}"
          else
            git tag "${{ steps.context.outputs.release_tag }}" "$GITHUB_SHA"
            git push origin "refs/tags/${{ steps.context.outputs.release_tag }}"
          fi

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.context.outputs.release_tag }}
          RELEASE_NAME: ${{ steps.context.outputs.release_name }}
          PRERELEASE: ${{ steps.context.outputs.prerelease }}
          SNAPSHOT: ${{ steps.context.outputs.snapshot }}
        run: |
          release_args=()
          if [ "$PRERELEASE" = "true" ]; then
            release_args+=(--prerelease)
          fi
          if [ "$SNAPSHOT" != "true" ]; then
            release_args+=(--draft)
          fi
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" --title "$RELEASE_NAME" --notes-file build/release-notes.md "${release_args[@]}"
          else
            gh release create "$RELEASE_TAG" --title "$RELEASE_NAME" --notes-file build/release-notes.md "${release_args[@]}"
          fi
          gh release upload "$RELEASE_TAG" build/github-release-assets/* --clobber

      - name: Publish Maven repository to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          aws s3 sync build/maven-repository s3://titlemanager-maven/ --endpoint-url "https://${CLOUDFLARE_ACCOUNT_ID}.r2.cloudflarestorage.com"
          aws s3 cp build/maven-repository/index.html s3://titlemanager-maven/index.html --cache-control 'no-cache' --content-type 'text/html; charset=utf-8' --endpoint-url "https://${CLOUDFLARE_ACCOUNT_ID}.r2.cloudflarestorage.com"

      - name: Prune old R2 snapshots
        if: steps.context.outputs.snapshot == 'true'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_BUCKET: titlemanager-maven
          R2_ENDPOINT_URL: https://${{ vars.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com
          SNAPSHOT_RETAIN_COUNT: '20'
        run: python3 .github/scripts/prune-r2-snapshots.py

      - name: Publish to Hangar
        env:
          HANGAR_API_TOKEN: ${{ secrets.HANGAR_API_TOKEN }}
          HANGAR_PROJECT_ID: ${{ vars.HANGAR_PROJECT_ID }}
          HANGAR_CHANNEL: ${{ steps.context.outputs.channel }}
          HANGAR_VERSION: ${{ steps.context.outputs.hangar_version }}
          HANGAR_CHANGELOG: ${{ steps.notes.outputs.body }}
        run: |
          if curl -fsS "https://hangar.papermc.io/api/v1/projects/${HANGAR_PROJECT_ID}/versions/${HANGAR_VERSION}" >/dev/null; then
            echo "Hangar version ${HANGAR_VERSION} already exists; skipping upload."
          else
            ./gradlew :apps:bukkit-plugin:publishPluginPublicationToHangar \
              -PtitleManagerJvmVersion=${{ steps.context.outputs.gradle_version }} \
              -PtitleManagerCoreVersion=${{ steps.context.outputs.gradle_version }}
          fi

      - name: Publish non-snapshot GitHub Release
        if: steps.context.outputs.snapshot != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.context.outputs.release_tag }}
          PRERELEASE: ${{ steps.context.outputs.prerelease }}
        run: |
          if [ "$PRERELEASE" = "true" ]; then
            gh release edit "$RELEASE_TAG" --draft=false --prerelease --latest=false
          else
            gh release edit "$RELEASE_TAG" --draft=false --prerelease=false --latest=true
          fi

  spigot:

    if: vars.ENABLE_PUBLISHING == 'true' && github.event_name == 'workflow_dispatch' && inputs.publish_spigot
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Validate Spigot configuration
        env:
          SPIGOT_RESOURCE_ID: ${{ vars.SPIGOT_RESOURCE_ID }}
          SPIGOT_API_KEY: ${{ secrets.SPIGOT_API_KEY }}
        run: |
          test -n "$SPIGOT_RESOURCE_ID" || { echo "Missing SPIGOT_RESOURCE_ID repository variable; current resource is expected to be 1049"; exit 1; }
          test -n "$SPIGOT_API_KEY" || { echo "Missing SPIGOT_API_KEY secret"; exit 1; }
          echo "Spigot publishing is intentionally gated behind manual dispatch, but no Spigot upload implementation is enabled yet because SpigotMC has no confirmed API contract in this repository."
          exit 1
